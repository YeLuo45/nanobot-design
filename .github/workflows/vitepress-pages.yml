name: Deploy VitePress Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['docs-site/**', '.github/workflows/vitepress-pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://yeluo45.github.io/nanobot-design/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: ./docs-site
        run: pnpm install

      - name: Build
        working-directory: ./docs-site
        run: |
          echo "=== Build started ==="
          pnpm run build > ../vitepress-build.log 2>&1 || true
          echo "=== Build exit code: $? ==="
          cat ../vitepress-build.log
          echo "=== End of log ==="
          if [ ! -d ".vitepress/dist" ]; then
            echo "ERROR: .vitepress/dist was NOT created"
            exit 1
          fi
          echo "=== dist contents ==="
          ls -la .vitepress/dist/

      - name: Upload artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs-site/.vitepress/dist

      - name: Deploy to GitHub Pages
        if: success()
        id: deployment
        uses: actions/deploy-pages@v4
